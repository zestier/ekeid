services:
  watcher:
    build:
      context: .
      dockerfile: Dockerfile
      target: watcher
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/ekeid.db
      - DUMP_FORMAT=bz2
      - CONTACT=${CONTACT:?Set CONTACT to a URL or email for Wikimedia User-Agent policy}

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data:ro
    environment:
      - DB_PATH=/data/ekeid.db
      - LISTEN_ADDR=:8080
      - RATE_LIMIT=10
      - RATE_BURST=20
